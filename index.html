<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Место, которое ждет</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="particles" id="particles" aria-hidden="true"></div>

  <main class="app" id="app">
    <section class="screen screen-active" id="screen-terminal" aria-label="Подключение">
      <div class="terminal" aria-live="polite">
        <div class="terminal-top">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="terminal-lines" id="terminalLines"></div>
      </div>
      <button class="ghost-button hidden" id="startButton" type="button">Начать</button>
    </section>

    <section class="screen" id="screen-menu" aria-label="Меню мини-игр">
      <div class="menu-scene">
        <div class="bubble-field" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="menu-heading">
          <p class="overline">little arcade</p>
          <h1>Выбери путь</h1>
        </div>
        <div class="menu-grid">
          <button class="menu-card" id="snakeFreeButton" type="button">
            <span class="menu-icon">∞</span>
            <strong>Бесконечная змейка</strong>
            <small>Играй без цели и таймера</small>
          </button>
          <button class="menu-card" id="flappyButton" type="button">
            <span class="menu-icon">↟</span>
            <strong>Flappy Bird</strong>
            <small>Роза летит между световыми стенами</small>
          </button>
          <button class="menu-card" id="messageButton" type="button">
            <span class="menu-icon">54</span>
            <strong>Послание</strong>
            <small>Набери 54 в змейке, чтобы открыть</small>
          </button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-game" aria-label="Игра">
      <div class="game-wrap">
        <div class="game-header">
          <div>
            <p class="overline">Memory gate</p>
            <h1 id="snakeTitle">Набери 54</h1>
          </div>
          <div class="score-card" aria-live="polite">
            <span>очки</span>
            <strong id="scoreValue">0</strong>
          </div>
        </div>

        <div class="game-board-shell">
          <div class="game-board" id="gameBoard" role="application" aria-label="Змейка"></div>
          <div class="game-complete hidden" id="gameComplete">
            <div class="complete-ring"></div>
            <p>Путь открыт</p>
          </div>
        </div>

        <div class="game-help">
          <span>WASD / стрелки</span>
          <span>свайп на телефоне</span>
          <button class="mini-button" id="snakeMenuButton" type="button">Меню</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-flappy" aria-label="Flappy Bird">
      <div class="flappy-wrap">
        <div class="game-header">
          <div>
            <p class="overline">rose flight</p>
            <h1>Flappy Bird</h1>
          </div>
          <div class="score-card" aria-live="polite">
            <span>очки</span>
            <strong id="flappyScoreValue">0</strong>
          </div>
        </div>
        <div class="flappy-stage" id="flappyStage" role="application" aria-label="Flappy Bird">
          <div class="flappy-rose" id="flappyRose"></div>
          <div class="flappy-overlay hidden" id="flappyOverlay">
            <div class="complete-ring"></div>
            <p id="flappyOverlayText">Нажми, чтобы взлететь</p>
          </div>
        </div>
        <div class="game-help">
          <span>Пробел / клик</span>
          <span>тап на телефоне</span>
          <button class="mini-button" id="flappyMenuButton" type="button">Меню</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-memory" aria-label="Воспоминания">
      <div class="poem" id="poemLines" aria-live="polite"></div>
      <button class="ghost-button hidden" id="continueButton" type="button">Продолжить</button>
    </section>

    <section class="screen" id="screen-final" aria-label="Финал">
      <div class="final-scene" aria-live="polite">
        <div class="final-terminal" id="finalTerminal">
          <div class="terminal-line" id="finalTerminalLine"></div>
        </div>
        <div class="final-message" id="finalMessage"></div>
        <div class="final-actions hidden" id="finalActions">
          <p>Мини-меню</p>
          <button class="ghost-button" id="replayButton" type="button">🎮 Сыграть ещё раз</button>
          <button class="ghost-button" id="finalMenuButton" type="button">Вернуться в меню</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
